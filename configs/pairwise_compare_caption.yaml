experiment:
  name: exp_pairwise_compare_caption_siglip
  output_dir: outputs/experiments

seed: 42
device: auto

data:
  train_pairs: outputs/pairwise_compare/pairs/train_pairs.csv
  val_pairs: outputs/pairwise_compare/pairs/val_pairs.csv
  train_image_root: data/train
  val_image_root: data/train
  test_csv: data/test.csv
  test_image_root: data/test
  sample_submission: data/sample_submission.csv
  train_caption_cache: outputs/caption_augmented/train_captions.jsonl
  test_caption_cache: outputs/caption_augmented/test_captions.jsonl
  caption_missing_policy: fail

model:
  backbone: google/siglip-base-patch16-224
  freeze_backbone: false
  projection_dim: 256
  hidden_dim: 512
  dropout: 0.2

training:
  epochs: 10
  batch_size: 16
  num_workers: 0
  learning_rate: 0.00002
  weight_decay: 0.01
  swap_probability: 0.5
  gradient_clip_norm: 1.0
  use_amp: true
  ddp_find_unused_parameters: true
  early_stopping_patience: 3

inference:
  batch_size: 64
  num_workers: 0
  threshold: 0.5
  pair_mode: canonical
  data_parallel: true
  reconstruction: permutation_search
